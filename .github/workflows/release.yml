name: release

# Auto-publish to PyPI on every merge to master. Calendar versioning
# (YYYY.M.D.<run_number>) — every push gets a unique PyPI version with no
# commit-back needed.
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  compute-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
    steps:
      - id: set
        run: |
          V=$(date -u +%Y.%-m.%-d).${{ github.run_number }}
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Releasing version $V"

  sdist:
    needs: compute-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Rewrite version in pyproject.toml
        run: |
          python -c "
          import re, sys
          p = 'pyproject.toml'
          src = open(p).read()
          src = re.sub(r'^version = \".*\"', 'version = \"${{ needs.compute-version.outputs.version }}\"', src, count=1, flags=re.M)
          open(p, 'w').write(src)
          "
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 1

  wheels:
    needs: compute-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, name: linux-x86_64 }
          - { os: macos-14,      name: macos-arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Rewrite version in pyproject.toml
        shell: bash
        run: |
          python3 -c "
          import re
          p = 'pyproject.toml'
          src = open(p).read()
          src = re.sub(r'^version = \".*\"', 'version = \"${{ needs.compute-version.outputs.version }}\"', src, count=1, flags=__import__('re').M)
          open(p, 'w').write(src)
          "
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2
      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.name }}
          path: wheelhouse/*.whl
          retention-days: 1

  publish:
    needs: [compute-version, sdist, wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for PyPI Trusted Publisher (OIDC)
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
