name: parity

on:
  push:
    branches: [master]
  pull_request:

# Keep only the latest run per ref to minimize storage.
concurrency:
  group: parity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync deps
        run: uv sync

      - name: Build + run parity proof
        run: ./proof/verify.sh

      # No byte-diff against committed proof/outputs — the upstream contract's
      # tolerance (rtol=1e-9, atol=1e-12) is the canonical gate, not byte
      # equality. The committed proof/outputs/ are a same-platform snapshot
      # from the author's macOS arm64; CI's Ubuntu x86_64 produces last-ULP
      # different JSON. verify.sh's compare.py is what enforces parity.

      - name: Run pytest
        run: uv run pytest tests/ -v
