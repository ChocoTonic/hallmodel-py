name: parity

on:
  push:
    branches: [master]
  pull_request:

# Keep only the latest run per ref to minimize storage.
concurrency:
  group: parity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync deps
        run: uv sync

      - name: Build + run parity proof
        run: ./proof/verify.sh

      - name: Diff outputs against committed proof
        run: |
          git diff --exit-code proof/outputs/ \
            || (echo "proof/outputs is stale — re-run ./proof/verify.sh and commit" && exit 1)

      - name: Run pytest
        run: uv run pytest tests/ -v
